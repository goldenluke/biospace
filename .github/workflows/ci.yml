name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências (biospace + testes)
        run: pip install -r requirements-dev.txt

      - name: Instalar dependências do dashboard
        run: pip install -r biospace_dashboard/requirements.txt

      - name: Rodar suíte de testes (pytest)
        run: pytest

      - name: Rodar exemplos standalone
        run: |
          for f in examples/*.py; do
            echo "--- $f ---"
            python3 "$f"
          done

      - name: Verificar instalação (check_install.py)
        run: python3 check_install.py

      - name: Rodar demo sintético (demo_sleep.py)
        run: python3 demo_sleep.py

      - name: Verificar TODAS as páginas do dashboard de SAOS (AppTest)
        run: python3 scripts/check_dashboard.py

      - name: Verificar TODAS as páginas do dashboard de Diabetes (AppTest)
        run: python3 scripts/check_dashboard_diabetes.py
